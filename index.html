<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigator Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import Navigator from "/src/index.js";
      const params = new URLSearchParams(window.location.search);
      const locale = params.get("locale") || undefined;
      const messagesRaw = params.get("messages");
      const messages = messagesRaw ? JSON.parse(decodeURIComponent(messagesRaw)) : undefined;
      const debug = params.get("debug") === "true";
      Navigator.init({ id: "app", locale, messages, debug });
    </script>
  </body>
</html>

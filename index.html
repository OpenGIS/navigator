<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Navigator</title>
    <meta name="description" content="A free, open-source navigation app for the real world." />
    <meta name="theme-color" content="#0d6efd" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Navigator" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import Navigator from "/src/index.js";
      const params = new URLSearchParams(window.location.search);
      const locale = params.get("locale") || undefined;
      const messagesRaw = params.get("messages");
      const messages = messagesRaw ? JSON.parse(decodeURIComponent(messagesRaw)) : undefined;
      const debug = params.get("debug") === "true";
      Navigator.create({ id: "app", locale, messages, debug }).mount();
    </script>
  </body>
</html>
